<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자격증 학습앱 ✏️</title>
</head>
<body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#f8f4ec;color:#243326;font-family:Arial,'Noto Sans KR',sans-serif">
<main style="width:min(420px,calc(100% - 40px));padding:24px;border-radius:18px;background:#fff;text-align:center;box-shadow:0 14px 36px rgba(28,42,31,.12)">
  <b style="display:block;font-size:18px;margin-bottom:8px">자격증 학습앱 불러오는 중</b>
  <p style="margin:0;color:#66705f;font-size:13px;line-height:1.6">잠깐만 기다려줘. 최신 화면을 여는 중이야.</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script>
(async () => {
  const base = 'payload/app-20260531-number-focus/';
  const files = ['part-00.b64','part-01.b64','part-02.b64','part-03.b64','part-04.b64','part-05.b64','part-06.b64'];
  const version = 'number-focus-cards-20260531';
  const chunks = await Promise.all(files.map(async file => {
    const res = await fetch(base + file + '?v=' + version, {cache:'no-store'});
    if (!res.ok) throw new Error(file + ' 로드 실패');
    return res.text();
  }));
  const b64 = chunks.join('').replace(/\s+/g, '');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const html = new TextDecoder('utf-8').decode(window.pako.ungzip(bytes));
  document.open();
  document.write(html);
  document.close();
})().catch(err => {
  document.body.innerHTML = '<main style="width:min(420px,calc(100% - 40px));margin:20vh auto 0;padding:24px;border-radius:18px;background:#fff;text-align:center;font-family:Arial,sans-serif"><b>앱을 못 불러왔어</b><p style="font-size:13px;color:#66705f;line-height:1.6">새로고침해보고, 계속 안 되면 주소 뒤 캐시 이름을 바꿔서 열어줘.<br>' + err.message + '</p></main>';
});
</script>
</body>
</html>
