name: Repair advanced study tools

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .advanced-tools-trigger.txt
      - .github/workflows/apply-advanced-study-tools.yml

permissions:
  contents: write

concurrency:
  group: apply-advanced-study-tools
  cancel-in-progress: false

jobs:
  repair-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair RPG advanced override
        run: |
          python - <<'PY'
          from pathlib import Path

          old_head = "const codexOriginalRpgQuizFor = rpgQuizFor;\n          function rpgQuizFor(type,stageId){const items=codexOriginalRpgQuizFor(type,stageId);"
          new_head = "var codexOriginalRpgQuizFor = rpgQuizFor;\n          rpgQuizFor=function(type,stageId){const items=codexOriginalRpgQuizFor(type,stageId);"
          old_tail = "return shuffle(pool.slice(0,rpgDifficultyInfo().count)).map(rpgShuffleQuestion);}\n\n          function buildWrongDrillQuestions"
          new_tail = "return shuffle(pool.slice(0,rpgDifficultyInfo().count)).map(rpgShuffleQuestion);};\n\n          function buildWrongDrillQuestions"

          changed = False
          for name in ["index.html", "study_app_latest.html"]:
              p = Path(name)
              text = p.read_text(encoding="utf-8")
              text2 = text.replace(old_head, new_head).replace(old_tail, new_tail)
              if text2 != text:
                  p.write_text(text2, encoding="utf-8")
                  changed = True

          Path(".codex-last-override.txt").write_text(
              "advanced study tools fixed\n" if changed else "advanced study tools already fixed\n",
              encoding="utf-8"
          )
          PY
      - name: Commit repaired advanced tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html study_app_latest.html .codex-last-override.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Repair advanced study tools"
            git push
          fi
