name: Apply advanced study tools

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .advanced-tools-trigger.txt
      - .github/workflows/apply-advanced-study-tools.yml

permissions:
  contents: write

concurrency:
  group: apply-advanced-study-tools
  cancel-in-progress: false

jobs:
  apply-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch advanced tools
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          BLOCK = r'''
          <!-- codex advanced study tools start -->
          <style>
          .law-check{margin-top:8px;color:var(--yellow);font-size:12px;line-height:1.5}
          .rpg-difficulty{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
          .rpg-difficulty .btn{padding:8px 12px;border-radius:999px}
          .rpg-difficulty .btn.active{background:var(--yellow);border-color:var(--yellow);color:#17120b}
          .rpg-review-list{display:grid;gap:8px;margin-top:8px}
          .study-bottom-nav{position:sticky;bottom:10px;z-index:8;display:flex;justify-content:center;gap:8px;margin:14px auto 0;padding:8px;width:max-content;max-width:100%;background:#111217ee;border:1px solid #ffffff14;border-radius:999px;box-shadow:0 12px 30px #00000066;backdrop-filter:blur(8px)}
          .study-bottom-nav .btn{border-radius:999px;padding:9px 14px;white-space:nowrap}
          .rpg-stats{grid-template-columns:repeat(auto-fit,minmax(112px,1fr))}
          </style>
          <script>
          var CODEX_LAW_CHECK_DATE='2026.05.29';
          var CODEX_RPG_DIFFICULTY={
            easy:{label:'가볍게',count:3,penalty:.65,reward:1.1,desc:'문제 3개, 벌점 약하게'},
            normal:{label:'기본',count:5,penalty:1,reward:1,desc:'문제 5개, 기본 흐름'},
            hard:{label:'빡세게',count:7,penalty:1.35,reward:.9,desc:'문제 7개, 계산/서류 함정 추가'}
          };
          var codexRpgDifficulty=localStorage.getItem('procurement_rpg_difficulty_v1')||'normal';
          function rpgDifficultyInfo(){return CODEX_RPG_DIFFICULTY[codexRpgDifficulty]||CODEX_RPG_DIFFICULTY.normal;}
          function setRpgDifficulty(level){
            if(!CODEX_RPG_DIFFICULTY[level])return;
            codexRpgDifficulty=level;
            localStorage.setItem('procurement_rpg_difficulty_v1',level);
            if(rpgState&&rpgState.gate){rpgState.gate.items=rpgQuizFor(rpgState.scenario,rpgState.gate.stage||rpgState.stage);rpgState.answers={};rpgState.docAnswers={};}
            renderRpg();
          }
          function rpgDifficultyButtons(){return `<div class="rpg-difficulty">${Object.entries(CODEX_RPG_DIFFICULTY).map(([key,info])=>`<button class="btn ${codexRpgDifficulty===key?'active':''}" onclick="setRpgDifficulty('${key}')">${esc(info.label)} <span class="small">${esc(info.desc)}</span></button>`).join('')}</div>`;}
          function rpgScaledDelta(value){const info=rpgDifficultyInfo();if(!value)return 0;return Math.round(value*(value<0?info.penalty:info.reward));}
          function rpgAddMistake(title,msg){const text=[title,msg].filter(Boolean).join(' · ');if(!text)return;rpgState.mistakes=rpgState.mistakes||[];if(!rpgState.mistakes.some(x=>x.text===text))rpgState.mistakes.push({text,t:Date.now()});}

          function renderQuiz(){
            const root=document.getElementById('quizRoot');
            if(!state.qs.length){resetQuiz();return}
            const done=Object.keys(state.answers).length;
            const cards=state.qs.map((q,idx)=>{
              const ua=state.answers[q.id];
              const opts=q.o.map((txt,i)=>{let cls='opt';if(ua===i)cls+=' sel';if(state.submitted&&i===q.a)cls+=' good';if(state.submitted&&ua===i&&ua!==q.a)cls+=' bad';return `<button class="${cls}" onclick="answer('${q.id}',${i})">${NUM[i]} ${esc(txt)}</button>`;}).join('');
              const lawCheck=(q.law||q.lawName)?`<div class="law-check">법령 확인일: ${CODEX_LAW_CHECK_DATE}</div>`:'';
              return `<div class="qcard" id="quizCard_${idx}"><div class="qmeta"><span class="tag">${q.subject}</span>${q.lawName?`<span class="tag">${esc(q.lawName)}</span>`:''}${q.topic?`<span class="tag">${esc(q.topic)}</span>`:''}<span class="tag hot">${q.difficulty}</span>${q.law?'<span class="tag new">법령</span>':''}<span class="tag">${q.group}</span></div><div class="qtitle">${questionIcon(q)} ${idx+1}. ${esc(q.q)}</div>${opts}<div class="explain ${state.submitted?'show':''}"><b>해설</b><br>${esc(q.e)}${lawCheck}</div></div>`;
            }).join('');
            const score=state.submitted?calcScore():null;
            root.innerHTML=`<div class="card"><h3>${label(state.mode)}</h3><p>${done}/${state.qs.length}문항 응답</p>${state.submitted?`<div class="score">${score}/${state.qs.length}</div>`:''}</div>${cards}<div class="modebar"><button class="btn primary" onclick="submitQuiz()">채점하기</button><button class="btn" onclick="startQuiz('${state.mode}')">다시 섞기</button></div><div class="study-bottom-nav"><button class="btn" onclick="quizScroll(-1)">이전</button><button class="btn" onclick="quizScroll(1)">다음</button><button class="btn primary" onclick="quizScrollUnanswered()">안 푼 문제</button><button class="btn green" onclick="submitQuiz()">채점</button></div>`;
          }
          function answer(id,i){if(state.submitted)return;state.answers[id]=i;saveQuizProgress('answering');recordActivity('problems','test',`${Object.keys(state.answers).length}/${state.qs.length}문항 응답`);renderQuiz();}
          function submitQuiz(){state.submitted=true;state.qs.forEach(q=>{if(state.answers[q.id]!==q.a)saveWrong(q,state.answers[q.id]);});saveQuizProgress('submitted');recordActivity('problems','test',`최근 점수 ${calcScore()}/${state.qs.length}`);renderQuiz();}
          function quizVisibleIndex(){const cards=[...document.querySelectorAll('#quizRoot .qcard')];const idx=cards.findIndex(card=>card.getBoundingClientRect().bottom>96);return idx<0?0:idx;}
          function quizScroll(delta){const cards=[...document.querySelectorAll('#quizRoot .qcard')];if(!cards.length)return;cards[Math.max(0,Math.min(cards.length-1,quizVisibleIndex()+delta))].scrollIntoView({behavior:'smooth',block:'start'});}
          function quizScrollUnanswered(){const idx=state.qs.findIndex(q=>state.answers[q.id]==null);const card=document.getElementById(`quizCard_${idx<0?0:idx}`);if(card)card.scrollIntoView({behavior:'smooth',block:'start'});}

          function renderChanges(cat=changeFilter){
            changeFilter=cat;const cats=['전체','기간','금액','공고'];
            document.getElementById('changeFilters').innerHTML=cats.map(c=>`<button class="num-chip ${c===cat?'active':''}" onclick="renderChanges('${c}')">${changeIcon(c)} ${c}</button>`).join('');
            const list=CHANGE_ITEMS.filter(item=>cat==='전체'||item.cat===cat);
            document.getElementById('changeRoot').innerHTML=list.map(item=>`<div class="change-card"><div class="change-head"><div class="change-title">${changeIcon(item.cat)} ${esc(item.title)}</div><span class="tag new">현재기준 확인</span></div><div class="change-grid"><div class="change-box old"><b>예전/혼동 포인트</b><p>${esc(item.old)}</p></div><div class="change-box now"><b>현재 정리</b><p>${esc(item.now)}</p></div></div><div class="change-note">🧠 ${esc(item.why)}<br>✍️ ${esc(item.exam)}</div><div class="change-source">확인일: ${CODEX_LAW_CHECK_DATE} · 근거: <a href="${escAttr(item.url)}" target="_blank">${esc(item.source)}</a></div></div>`).join('');
          }

          function rpgStart(type='work'){
            if(type==='random')type=shuffle(['work','workSmall','service','goods'])[0];
            const sc=RPG_SCENARIOS[type]||RPG_SCENARIOS.work;
            const events={change:shuffle(RPG_CHANGE_EVENTS[type]||RPG_CHANGE_EVENTS.work)[0],defect:shuffle(RPG_DEFECT_EVENTS[type]||RPG_DEFECT_EVENTS.work)[0],changeDone:false,defectDone:false};
            rpgState={scenario:type,stage:sc.start,cash:50,trust:50,hint:false,result:null,gate:null,answers:{},docAnswers:{},log:[],events,mistakes:[],summarySaved:false};
            recordActivity('flowsim','work',`${sc.title} 시작`);setFlowMode('rpg');renderRpg();
          }
          function rpgChoose(idx){
            const stage=currentRpgStage();const choice=stage.choices[idx];if(!choice)return;
            rpgState.cash=clamp(rpgState.cash+rpgScaledDelta(choice.cash||0),0,100);rpgState.trust=clamp(rpgState.trust+rpgScaledDelta(choice.trust||0),0,100);
            rpgState.result=choice;rpgState.hint=false;rpgState.answers={};rpgState.docAnswers={};
            rpgState.log.push({stage:stage.phase,choice:choice.t,kind:choice.kind,msg:choice.msg});if(choice.kind!=='ok')rpgAddMistake(stage.phase,choice.msg);
            recordActivity('flowsim','work',`${stage.phase} · ${choice.t}`);
            if(choice.kind==='ok'&&choice.next&&choice.next!=='finish')rpgState.gate={stage:rpgState.stage,next:choice.next,items:rpgQuizFor(rpgState.scenario,rpgState.stage),passed:false};
            else if(choice.kind==='ok'&&choice.next==='finish')rpgState.gate={stage:rpgState.stage,next:'finish',items:rpgQuizFor(rpgState.scenario,rpgState.stage),passed:false};
            else rpgState.gate=null;
            renderRpg();
          }
          function rpgAnswer(qidx,oidx){if(!rpgState.gate)return;rpgState.answers[qidx]=oidx;const q=rpgState.gate.items[qidx];if(q&&q.a!==oidx)rpgAddMistake('미션 오답',q.q);renderRpg();}
          function rpgDocToggle(qidx,oidx){if(!rpgState.gate)return;const key=String(qidx);const row=new Set(rpgState.docAnswers[key]||[]);const was=row.has(oidx);if(was)row.delete(oidx);else row.add(oidx);rpgState.docAnswers[key]=[...row].sort((a,b)=>a-b);const q=rpgState.gate.items[qidx];if(q&&q.type==='docs'&&!was&&!(q.a||[]).includes(oidx))rpgAddMistake('서류 함정 선택',`${q.q} / ${q.o[oidx]}`);renderRpg();}
          function rpgFinish(){const sc=currentRpgScenario();const summary={id:'rpg-'+Date.now(),t:Date.now(),title:sc.title,type:sc.type,scenario:rpgState.scenario,difficulty:codexRpgDifficulty,budget:sc.budget,cash:rpgState.cash,trust:rpgState.trust,log:rpgState.log.slice(-12),mistakes:(rpgState.mistakes||[]).slice(-12)};const rows=loadRpgSummaries();rows.unshift(summary);localStorage.setItem('procurement_rpg_summaries_v1',JSON.stringify(rows.slice(0,20)));saveRpgReview(summary);recordActivity('flowsim','work',`${sc.title} 계약정리 저장`);rpgState.summarySaved=true;rpgState.result={kind:'ok',t:'계약 정리 저장',msg:'계약 정리표가 홈/브라우저 저장소에 저장됐습니다.',next:'finish'};rpgState.gate=null;renderRpg();}
          function saveRpgReview(summary){const rows=loadRpgReview();rows.unshift({id:summary.id,t:summary.t,title:summary.title,type:summary.type,difficulty:summary.difficulty,mistakes:summary.mistakes||[],cash:summary.cash,trust:summary.trust});localStorage.setItem('procurement_rpg_review_v1',JSON.stringify(rows.slice(0,30)));}
          function loadRpgReview(){try{return JSON.parse(localStorage.getItem('procurement_rpg_review_v1')||'[]')}catch(e){return[]}}

          function renderRpg(){
            const sc=currentRpgScenario();const stage=currentRpgStage();const result=rpgState.result;const root=document.getElementById('rpgRoot');if(!root)return;
            root.innerHTML=`<div class="rpg-card"><div class="rpg-quest-head"><div class="rpg-avatar">${esc(rpgScenarioAvatar(rpgState.scenario))}</div><div><div class="rpg-quest-title">${esc(sc.type)} 계약 RPG</div><div class="rpg-quest-main">${esc(sc.title)}</div></div></div>${rpgDifficultyButtons()}<div class="rpg-case"><div><b>계약/예산</b><span>${esc(sc.budget)}</span></div><div><b>업체상황</b><span>${esc(sc.company)}</span></div><div><b>목표</b><span>${esc(sc.goal)}</span></div></div>${renderRpgMap(stage)}<div class="rpg-stats"><div><b>${rpgState.cash}</b><span>업체 자금</span></div><div><b>${rpgState.trust}</b><span>계약 안정도</span></div><div><b>${rpgState.log.length}</b><span>판단 기록</span></div><div><b>${esc(rpgDifficultyInfo().label)}</b><span>난이도</span></div></div><div class="sim-phase">${esc(stage.phase)}</div>${stage.eventTitle?`<div class="tag hot">랜덤 사건: ${esc(stage.eventTitle)}</div>`:''}<div class="rpg-scene">${esc(stage.scene)}</div>${rpgNpcLine(stage)}<button class="btn" onclick="rpgToggleHint()">💡 힌트 ${rpgState.hint?'숨기기':'보기'}</button><div class="rpg-hint ${rpgState.hint?'show':''}">${esc(stage.hint)}</div>${result?renderRpgResult(result):renderRpgChoices(stage)}${rpgState.gate?renderRpgGate():''}${rpgState.summarySaved?renderRpgSavedSummary():''}<div class="study-bottom-nav"><button class="btn" onclick="rpgToggleHint()">힌트</button><button class="btn" onclick="rpgReset()">처음부터</button>${rpgState.gate?`<button class="btn primary" ${rpgGatePassed()?'':'disabled'} onclick="rpgAdvance()">다음</button>`:''}</div></div>`;
            document.getElementById('rpgLog').innerHTML=(rpgState.log.length?rpgState.log.slice().reverse().map(x=>`<div class="rpg-log-item ${x.kind}"><b>${esc(x.stage)}</b><br>${esc(x.choice)}<br>${esc(x.kind==='ok'?'✅':x.kind==='warn'?'⚠️':'❌')} ${esc(x.msg)}</div>`).join(''):'<div class="rpg-log-item">아직 선택 기록이 없습니다.</div>')+(loadRpgSummaries().length?`<div class="rpg-log-item"><b>저장된 계약정리</b><br>${loadRpgSummaries().slice(0,3).map(s=>esc(s.title+' · '+new Date(s.t).toLocaleDateString('ko-KR'))).join('<br>')}</div>`:'');
          }
          function renderRpgGate(){const gate=rpgState.gate;const passed=rpgGatePassed();const solved=gate.items.map((q,i)=>rpgQuestionPassed(q,i));const need=gate.items.length;const rows=gate.items.map((q,qi)=>{if(q.type==='docs'){const picked=rpgState.docAnswers[String(qi)]||[];const req=q.a||[];const touched=picked.length>0;const exact=picked.length===req.length&&req.every(x=>picked.includes(x));return `<div class="home-list-item"><b>${qi+1}. ${esc(q.q)}</b><span>${esc(q.h||'필요한 서류를 전부 고르세요. 하나라도 빠지면 다음으로 못 갑니다.')}</span><div class="rpg-docs">${q.o.map((o,oi)=>{const sel=picked.includes(oi);const cls=touched?sel?(req.includes(oi)?'good':'bad'):req.includes(oi)?'bad':'':'';return `<button class="rpg-doc ${sel?'sel':''} ${cls}" onclick="rpgDocToggle(${qi},${oi})">${sel?'☑':'☐'} ${esc(o)}</button>`;}).join('')}</div>${touched?`<div class="rpg-doc-note">${exact?'✅ 서류 세트 완성':'❌ 필요한 서류를 전부 고르고, 불필요한 서류는 빼야 해요.'} · ${esc(q.e)}</div>`:''}</div>`;}return `<div class="home-list-item"><b>${qi+1}. ${esc(q.q)}</b><span>${esc(q.h||'')}</span><div class="rpg-choices">${q.o.map((o,oi)=>`<button class="rpg-choice ${rpgState.answers[qi]===oi?(oi===q.a?'good':'bad'):''}" onclick="rpgAnswer(${qi},${oi})"><b>${esc(o)}</b></button>`).join('')}</div>${rpgState.answers[qi]!=null?`<div class="small">${rpgState.answers[qi]===q.a?'✅ 정답':'❌ 다시 골라봐'} · ${esc(q.e)}</div>`:''}</div>`;}).join('');return `<div class="rpg-card rpg-mission-card" style="margin-top:10px"><div class="sim-phase">🔐 다음 단계 잠금해제 미션</div><div class="rpg-scene">서류 선택 문제는 필요한 서류를 전부 골라야 하고, 공식·개념 문제까지 ${need}개를 모두 맞히면 다음 단계로 진행됩니다.</div><div class="rpg-gate-progress">${solved.map(x=>`<span class="rpg-gate-dot ${x?'done':''}"></span>`).join('')}</div><div class="rpg-choices">${rows}</div><div class="sim-actions"><button class="btn primary" ${passed?'':'disabled'} onclick="rpgAdvance()">${passed?'다음 단계로':`${need}개 모두 맞히면 진행`}</button></div></div>`;}
          function renderRpgSavedSummary(){const sc=currentRpgScenario();const good=rpgState.log.filter(x=>x.kind==='ok').length;const bad=rpgState.log.filter(x=>x.kind==='bad').length;const mistakes=(rpgState.mistakes||[]).slice(-5);return `<div class="rpg-card" style="margin-top:10px"><div class="sim-phase">📌 저장된 계약 정리</div><div class="rpg-scene">${esc(sc.title)} 완료</div><div class="home-list"><div class="home-list-item"><b>핵심 흐름</b><span>예산/문서 → 계약방법 → 계약체결 → 선금/금융지원 → 기성·검사 → 대금·하자</span></div><div class="home-list-item"><b>중요 체크</b><span>선금은 보증·정산, 기성대가는 확인·청구, 최종대금은 검사 후 지급</span></div><div class="home-list-item"><b>플레이 결과</b><span>맞은 판단 ${good}개 / 위험 판단 ${bad}개 / 자금 ${rpgState.cash} / 안정도 ${rpgState.trust}</span></div></div>${mistakes.length?`<div class="rpg-review-list">${mistakes.map(x=>`<div class="home-list-item"><b>다시 볼 포인트</b><span>${esc(x.text)}</span></div>`).join('')}</div>`:'<div class="home-list-item"><b>다시 볼 포인트</b><span>이번 판은 큰 실수 없이 마무리했어요.</span></div>'}</div>`;}
          function rpgHardQuestions(type){const base=[{q:'계약금액 6억 4천만원, 선금 25% 지급 후 기성 인정률이 40%다. 같은 비율로 선금을 정산하면 이번 기성 지급 감각은?',o:['1억 9,200만원','2억 5,600만원','1억 6,000만원','6,400만원'],a:0,e:'기성 인정액 2억 5,600만원에서 선금 정산분 6,400만원을 빼면 1억 9,200만원입니다.',h:'기성 인정액 - 선금 정산분'},{q:'변경계약 전에 먼저 확인할 조합으로 가장 촘촘한 것은?',o:['변경 사유, 귀책 여부, 금액 산출, 기간 영향, 예산','업체 요청서와 담당자 구두 승인','회의록과 문자 메시지','준공검사조서와 하자보수보증서'],a:0,e:'변경은 사유, 책임, 금액, 기간, 예산을 묶어서 봐야 합니다.',h:'변경은 돈만 보는 문제가 아닙니다.'},{q:'검사 합격 전 대금청구서와 세금계산서만 먼저 들어왔다. 가장 안전한 판단은?',o:['검사·검수 완료와 정산 사항을 확인한 뒤 지급한다','청구서류가 있으니 바로 지급한다','선금 정산은 다음 계약에서 처리한다','하자보수 단계에서 검사조서를 만든다'],a:0,e:'대금 지급은 청구서류보다 이행 확인과 정산이 먼저입니다.',h:'청구서가 지급 요건 전부는 아닙니다.'}];if(type==='goods')base.push({q:'규격 대체 납품을 허용할 때 가장 먼저 문서화할 것은?',o:['동등 이상 성능 비교와 승인 근거','납품업체의 전화 설명','검수 후 민원 여부','대금 지급 예정일'],a:0,e:'대체 모델은 동등 이상 비교표와 승인 근거가 핵심입니다.',h:'물품은 규격 적합성이 중심입니다.'});if(type==='service')base.push({q:'용역 산출물 누락이 발견됐을 때 바로 대금 전액 지급이 위험한 이유는?',o:['검사 기준과 과업 이행 여부가 충족되지 않았기 때문','용역은 하자가 절대 발생하지 않기 때문','계약보증금이 자동 면제되기 때문','제안평가를 다시 해야 하기 때문'],a:0,e:'용역은 산출물 이행이 대금 지급과 직결됩니다.',h:'산출물 누락은 단순 오탈자가 아닐 수 있습니다.'});return shuffle(base);}
          const codexOriginalRpgQuizFor = rpgQuizFor;
          function rpgQuizFor(type,stageId){const items=codexOriginalRpgQuizFor(type,stageId);const doc=items.find(x=>x.type==='docs')||items[0];const rest=items.filter(x=>x!==doc);const extra=codexRpgDifficulty==='hard'?rpgHardQuestions(type):[];const pool=[doc,...extra,...rest];return shuffle(pool.slice(0,rpgDifficultyInfo().count)).map(rpgShuffleQuestion);}

          function buildWrongDrillQuestions(rows){const originals=rows.map(q=>({...q,group:q.group||'오답 원문'}));const seen=new Set(originals.map(q=>q.id));const extra=[];originals.forEach(q=>{const candidates=shuffle(QUESTIONS.filter(item=>{if(seen.has(item.id))return false;return (q.lawName&&item.lawName===q.lawName)||(q.topic&&item.topic===q.topic)||item.subject===q.subject;})).slice(0,3);candidates.forEach((item,n)=>{seen.add(item.id);extra.push({...item,id:`${item.id}_drill_${q.id}_${n}`,group:'오답 유사문항'});});});return shuffle([...originals,...extra]).slice(0,Math.min(50,Math.max(20,originals.length*4)));}
          function renderReview(){const data=loadWrong();const rows=Object.values(data).sort((a,b)=>b.t-a.t);const root=document.getElementById('reviewRoot');if(!rows.length){root.innerHTML='<div class="card"><p>아직 저장된 오답이 없습니다.</p></div>';return}root.innerHTML=`<div class="card"><h3>저장된 오답 ${rows.length}개</h3><p class="small">오답 다시 풀기는 같은 과목/법령/주제 유사문항을 최대 3개씩 같이 섞습니다.</p>${rows.map(x=>`<div class="review-item"><div class="small">${x.q.subject} · 내 선택: ${x.my==null?'미응답':NUM[x.my]}</div><b>${esc(x.q.q)}</b><p class="small">정답 ${NUM[x.q.a]} ${esc(x.q.o[x.q.a])}</p><p class="small">${esc(x.q.e)}</p></div>`).join('')}</div>`;}
          function startWrongQuiz(){const rows=Object.values(loadWrong()).map(x=>x.q);switchTab('problems');showProblemPanel('quizPanel');if(!rows.length){resetQuiz();return}state={mode:'wrong',qs:buildWrongDrillQuestions(rows),answers:{},submitted:false};saveQuizProgress('wrong-drill');renderQuiz();}

          try{renderChanges(changeFilter);if(document.getElementById('quizRoot')&&state&&state.qs&&state.qs.length)renderQuiz();if(document.getElementById('rpgRoot'))renderRpg();if(document.getElementById('reviewRoot'))renderReview();}catch(e){console.warn('advanced tools refresh skipped',e)}
          </script>
          <!-- codex advanced study tools end -->
          '''.strip()

          marker = re.compile(r"\n?\s*<!-- codex advanced study tools start -->.*?<!-- codex advanced study tools end -->", re.S)
          for name in ["index.html", "study_app_latest.html"]:
            p=Path(name)
            text=p.read_text(encoding="utf-8")
            text=marker.sub("", text)
            text=text.replace("확인 기준일은 2026-05-28입니다.", "확인 기준일은 2026-05-29입니다.")
            text=text.replace("</body>", BLOCK + "\n</body>", 1)
            p.write_text(text, encoding="utf-8")

          Path(".codex-last-override.txt").write_text("advanced study tools applied\n", encoding="utf-8")
          PY
      - name: Commit advanced tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html study_app_latest.html .codex-last-override.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add advanced study tools"
            git push
          fi
