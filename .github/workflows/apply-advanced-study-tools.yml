name: Repair advanced study tools

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .advanced-tools-trigger.txt
      - .github/workflows/apply-advanced-study-tools.yml

permissions:
  contents: write

concurrency:
  group: apply-advanced-study-tools
  cancel-in-progress: false

jobs:
  repair-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair RPG advanced override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          head = re.compile(r"const\s+codexOriginalRpgQuizFor\s*=\s*rpgQuizFor;\s*function\s+rpgQuizFor\(type,stageId\)\{const\s+items\s*=\s*codexOriginalRpgQuizFor\(type,stageId\);")
          tail = re.compile(r"return\s+shuffle\(pool\.slice\(0,rpgDifficultyInfo\(\)\.count\)\)\.map\(rpgShuffleQuestion\);\}\s*function\s+buildWrongDrillQuestions")
          new_head = "var codexOriginalRpgQuizFor = rpgQuizFor;\nrpgQuizFor=function(type,stageId){const items=codexOriginalRpgQuizFor(type,stageId);"
          new_tail = "return shuffle(pool.slice(0,rpgDifficultyInfo().count)).map(rpgShuffleQuestion);};\n\nfunction buildWrongDrillQuestions"

          changed = False
          for name in ["index.html", "study_app_latest.html"]:
              p = Path(name)
              text = p.read_text(encoding="utf-8")
              text2 = head.sub(new_head, text)
              text2 = tail.sub(new_tail, text2)
              if text2 != text:
                  p.write_text(text2, encoding="utf-8")
                  changed = True

          Path(".codex-last-override.txt").write_text(
              "advanced study tools fixed flexible\n" if changed else "advanced study tools flexible no-op\n",
              encoding="utf-8"
          )
          PY
      - name: Commit repaired advanced tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html study_app_latest.html .codex-last-override.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Repair advanced study tools"
            git push
          fi
