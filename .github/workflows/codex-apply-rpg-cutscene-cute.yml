name: Codex Apply Cute RPG Redesign

on:
  push:
    paths:
      - ".github/workflows/codex-apply-rpg-cutscene-cute.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply Codex redesign payload
        shell: bash
        run: |
          set -euo pipefail
          payload_dir=".codex-deploy/rpg-cutscene-cute-20260530"
          cat "$payload_dir"/part01.txt "$payload_dir"/part02.txt "$payload_dir"/part03.txt "$payload_dir"/part04.txt "$payload_dir"/part05.txt "$payload_dir"/part06.txt > /tmp/codex.patch.gz.b64

          test "$(sha256sum /tmp/codex.patch.gz.b64 | awk '{print $1}')" = "8de84c19dbc175b2710927a5d511c330f3dca2bb002f30f47d86d43d37d25649"
          test "$(sha256sum index.html | awk '{print $1}')" = "f16750ec5b181a1ceb997878666e992041261dc5d4fc75d3a696b1f67378bf38"
          test "$(sha256sum study_app_latest.html | awk '{print $1}')" = "f16750ec5b181a1ceb997878666e992041261dc5d4fc75d3a696b1f67378bf38"

          base64 -d /tmp/codex.patch.gz.b64 | gzip -d > /tmp/codex.patch
          test "$(sha256sum /tmp/codex.patch | awk '{print $1}')" = "a995195dddc95c821d79a991a38c29316ca94941ae04b7b8edc3ba9fb13e8f84"

          git apply /tmp/codex.patch
          cp index.html study_app_latest.html

          test "$(sha256sum index.html | awk '{print $1}')" = "7fe8d92f16715228706e00ed8bf3d50836da771856ada3338a8946c5c1e96b21"
          test "$(sha256sum study_app_latest.html | awk '{print $1}')" = "7fe8d92f16715228706e00ed8bf3d50836da771856ada3338a8946c5c1e96b21"

          rm -rf "$payload_dir"
          rm -f .github/workflows/codex-apply-rpg-cutscene-cute.yml

      - name: Commit applied redesign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "codex-deploy"
          git config user.email "codex-deploy@users.noreply.github.com"
          git add -A index.html study_app_latest.html .codex-deploy .github/workflows/codex-apply-rpg-cutscene-cute.yml
          git commit -m "Apply cute RPG redesign"
          git push origin main
