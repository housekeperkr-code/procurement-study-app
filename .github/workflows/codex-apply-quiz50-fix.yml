name: Codex Apply Quiz 50 Fix

on:
  push:
    paths:
      - ".github/workflows/codex-apply-quiz50-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply quiz fix patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/codex.patch.gz.b64 <<'PAYLOAD'

PAYLOAD
          test "$(sha256sum /tmp/codex.patch.gz.b64 | awk '{print $1}')" = "f5bc56eafc0ca7fadc3f990fe56cf97af4abb819322dc87aeb0aa31fe106c84a"
          test "$(sha256sum index.html | awk '{print $1}')" = "7fe8d92f16715228706e00ed8bf3d50836da771856ada3338a8946c5c1e96b21"
          test "$(sha256sum study_app_latest.html | awk '{print $1}')" = "7fe8d92f16715228706e00ed8bf3d50836da771856ada3338a8946c5c1e96b21"
          base64 -d /tmp/codex.patch.gz.b64 | gzip -d > /tmp/codex.patch
          test "$(sha256sum /tmp/codex.patch | awk '{print $1}')" = "34f7e6b6c8850299034296b75c4afe1b2cb33cc3ada3e36230f42043c6459e97"
          git apply /tmp/codex.patch
          cp index.html study_app_latest.html
          test "$(sha256sum index.html | awk '{print $1}')" = "371a1510ce779a096e037fd96418d96ba8c2d3af32435a044d3b64dfc4506ede"
          test "$(sha256sum study_app_latest.html | awk '{print $1}')" = "371a1510ce779a096e037fd96418d96ba8c2d3af32435a044d3b64dfc4506ede"
          rm -f .github/workflows/codex-apply-quiz50-fix.yml

      - name: Commit applied quiz fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "codex-deploy"
          git config user.email "codex-deploy@users.noreply.github.com"
          git add -A index.html study_app_latest.html .github/workflows/codex-apply-quiz50-fix.yml
          git commit -m "Fix objective quiz question set"
          git push origin main
