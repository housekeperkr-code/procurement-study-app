name: Codex Apply Quiz 150 Bank

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply quiz bank update
        shell: bash
        run: |
          set -euo pipefail
          base_expected="7fe8d92f16715228706e00ed8bf3d50836da771856ada3338a8946c5c1e96b21"
          target_expected="5cd28732682e3ce6d00e92068cd18b1f5b9a55723516fde353d9ff3cf1cbf2e6"
          current="$(sha256sum index.html | awk '{print $1}')"
          if [ "$current" != "$base_expected" ] && [ "$current" != "$target_expected" ]; then
            echo "Unexpected index.html checksum: $current"
            exit 1
          fi
          if [ "$current" = "$base_expected" ]; then
            base64 -d .codex/quiz150.patch.gz.b64 | gunzip > /tmp/quiz150.patch
            git apply /tmp/quiz150.patch
          fi
          cp index.html study_app_latest.html
          test "$(sha256sum index.html | awk '{print $1}')" = "$target_expected"
          test "$(sha256sum study_app_latest.html | awk '{print $1}')" = "$target_expected"
          rm -f .github/workflows/codex-apply-quiz150-bank.yml .github/workflows/codex-apply-quiz50-fix.yml .codex/quiz150.patch.gz.b64 .codex/quiz150.trigger
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A index.html study_app_latest.html .github/workflows/codex-apply-quiz150-bank.yml .github/workflows/codex-apply-quiz50-fix.yml .codex/quiz150.patch.gz.b64 .codex/quiz150.trigger
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Expand quiz bank to 150 questions"
          git push
